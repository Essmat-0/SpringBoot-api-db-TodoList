<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TodoList</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --accent: #7c6aff;
    --accent2: #ff6a8a;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --success: #4fffb0;
    --error: #ff4f6a;
    --done: #2a2a3a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    z-index: 0;
    pointer-events: none;
  }

  .glow {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.08;
    z-index: 0;
    pointer-events: none;
  }
  .glow-1 { background: var(--accent); top: -150px; right: -150px; }
  .glow-2 { background: var(--accent2); bottom: -150px; left: -150px; }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -1px;
  }
  .brand span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .username-badge {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .username-badge strong { color: var(--accent); }

  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--error); color: var(--error); }

  /* MAIN LAYOUT */
  main {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin-bottom: 40px;
    border: 1px solid var(--border);
  }
  .stat {
    background: var(--surface);
    padding: 20px 24px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-num.accent { color: var(--accent); }
  .stat-num.success { color: var(--success); }
  .stat-num.muted { color: var(--muted); }
  .stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ADD FORM */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 32px;
  }

  .add-form-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  input[type="text"], textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 11px 16px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }

  textarea { width: 100%; height: 60px; margin-bottom: 10px; }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 11px 20px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.85; }
  .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 2px;
    margin-bottom: 20px;
  }
  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* TODO LIST */
  .todo-list { display: flex; flex-direction: column; gap: 2px; }

  .todo-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.2s, opacity 0.3s;
    animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .todo-item.completed { opacity: 0.5; }
  .todo-item:hover { border-color: #2e2e40; }

  .check-btn {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    color: transparent;
    font-size: 12px;
  }
  .check-btn:hover { border-color: var(--success); color: var(--success); }
  .todo-item.completed .check-btn {
    background: var(--success);
    border-color: var(--success);
    color: var(--bg);
  }

  .todo-body { flex: 1; min-width: 0; }

  .todo-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
    transition: all 0.2s;
  }
  .todo-item.completed .todo-title {
    text-decoration: line-through;
    color: var(--muted);
  }

  .todo-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .todo-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .todo-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    transition: color 0.2s;
  }
  .icon-btn:hover.delete { color: var(--error); }
  .icon-btn:hover.edit { color: var(--accent); }

  /* EDIT MODAL */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 36px;
    width: 440px;
    animation: slideUp 0.3s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .btn-save {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }

  .btn-cancel {
    flex: 1;
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--error); color: var(--error); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
  .empty-text { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

  .toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 20px;
    font-size: 12px;
    letter-spacing: 1px;
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-left: 3px solid var(--success); color: var(--success); }
  .toast.error { border-left: 3px solid var(--error); color: var(--error); }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<header>
  <div class="brand">todo<span>.</span></div>
  <div class="header-right">
    <div class="username-badge">logged in as <strong id="usernameDisplay">—</strong></div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num accent" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num success" id="statDone">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num muted" id="statPending">0</div>
      <div class="stat-label">Pending</div>
    </div>
  </div>

  <!-- Add Form -->
  <div class="add-form">
    <div class="add-form-title">New Task</div>
    <div class="input-row">
      <input type="text" id="newTitle" placeholder="What needs to be done?"/>
      <button class="btn-add" onclick="createTodo()">+ Add</button>
    </div>
    <textarea id="newDesc" placeholder="Description (optional)"></textarea>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
  </div>

  <!-- List -->
  <div class="todo-list" id="todoList"></div>
</main>

<!-- Edit Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Edit Task</div>
    <input type="text" id="editTitle" placeholder="Title" style="width:100%;margin-bottom:10px"/>
    <textarea id="editDesc" placeholder="Description" style="width:100%;height:80px;margin-bottom:0"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:8080/api';
  let todos = [];
  let filter = 'all';
  let editingId = null;

  function token() { return localStorage.getItem('token'); }

  function headers() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token()}` };
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'auth.html';
  }

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function updateStats() {
    const done = todos.filter(t => t.completed).length;
    document.getElementById('statTotal').textContent = todos.length;
    document.getElementById('statDone').textContent = done;
    document.getElementById('statPending').textContent = todos.length - done;
  }

  function render() {
    const list = document.getElementById('todoList');
    let visible = todos;
    if (filter === 'pending') visible = todos.filter(t => !t.completed);
    if (filter === 'done') visible = todos.filter(t => t.completed);

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">◻</div><div class="empty-text">No tasks here</div></div>`;
      return;
    }

    list.innerHTML = visible.map(todo => `
      <div class="todo-item ${todo.completed ? 'completed' : ''}" id="item-${todo.id}">
        <button class="check-btn" onclick="toggleTodo(${todo.id}, ${todo.completed})">✓</button>
        <div class="todo-body">
          <div class="todo-title">${escHtml(todo.title)}</div>
          ${todo.description ? `<div class="todo-desc">${escHtml(todo.description)}</div>` : ''}
          <div class="todo-meta">${formatDate(todo.createdAt)}</div>
        </div>
        <div class="todo-actions">
          <button class="icon-btn edit" onclick="openEdit(${todo.id})">✎</button>
          <button class="icon-btn delete" onclick="deleteTodo(${todo.id})">✕</button>
        </div>
      </div>
    `).join('');

    updateStats();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(dt) {
    if (!dt) return '';
    return new Date(dt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  async function loadTodos() {
    try {
      const res = await fetch(`${API}/todos`, { headers: headers() });
      if (res.status === 401) return logout();
      todos = await res.json();
      updateStats();
      render();
    } catch (e) {
      toast('Failed to load todos', 'error');
    }
  }

  async function createTodo() {
    const title = document.getElementById('newTitle').value.trim();
    const description = document.getElementById('newDesc').value.trim();
    if (!title) return;

    try {
      const res = await fetch(`${API}/todos`, {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ title, description, completed: false })
      });
      const todo = await res.json();
      todos.unshift(todo);
      document.getElementById('newTitle').value = '';
      document.getElementById('newDesc').value = '';
      render();
      toast('Task added');
    } catch (e) {
      toast('Failed to add task', 'error');
    }
  }

  async function toggleTodo(id, current) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    try {
      const res = await fetch(`${API}/todos/${id}`, {
        method: 'PUT',
        headers: headers(),
        body: JSON.stringify({ ...todo, completed: !current })
      });
      const updated = await res.json();
      todos = todos.map(t => t.id === id ? updated : t);
      render();
    } catch (e) {
      toast('Failed to update', 'error');
    }
  }

  async function deleteTodo(id) {
    try {
      await fetch(`${API}/todos/${id}`, { method: 'DELETE', headers: headers() });
      todos = todos.filter(t => t.id !== id);
      render();
      toast('Task deleted');
    } catch (e) {
      toast('Failed to delete', 'error');
    }
  }

  function openEdit(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    editingId = id;
    document.getElementById('editTitle').value = todo.title;
    document.getElementById('editDesc').value = todo.description || '';
    document.getElementById('overlay').classList.add('show');
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('overlay')) return;
    document.getElementById('overlay').classList.remove('show');
    editingId = null;
  }

  async function saveEdit() {
    const title = document.getElementById('editTitle').value.trim();
    const description = document.getElementById('editDesc').value.trim();
    if (!title || !editingId) return;

    const todo = todos.find(t => t.id === editingId);
    try {
      const res = await fetch(`${API}/todos/${editingId}`, {
        method: 'PUT',
        headers: headers(),
        body: JSON.stringify({ ...todo, title, description })
      });
      const updated = await res.json();
      todos = todos.map(t => t.id === editingId ? updated : t);
      document.getElementById('overlay').classList.remove('show');
      editingId = null;
      render();
      toast('Task updated');
    } catch (e) {
      toast('Failed to update', 'error');
    }
  }

  document.getElementById('newTitle').addEventListener('keydown', e => {
    if (e.key === 'Enter') createTodo();
  });

  // Init
  if (!token()) { window.location.href = 'auth.html'; }
  else {
    document.getElementById('usernameDisplay').textContent = localStorage.getItem('username') || '—';
    loadTodos();
  }
</script>
</body>
</html>
