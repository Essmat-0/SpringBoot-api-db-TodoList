<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TodoList</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="/css/index.css" rel="stylesheet">
</head>
<body>
<div class="grid-bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<header>
  <div class="brand">todo<span>.</span></div>
  <div class="header-right">
    <div class="username-badge">logged in as <strong id="usernameDisplay">—</strong></div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num accent" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num success" id="statDone">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num muted" id="statPending">0</div>
      <div class="stat-label">Pending</div>
    </div>
  </div>

  <!-- Add Form -->
  <div class="add-form">
    <div class="add-form-title">New Task</div>
    <div class="input-row">
      <input type="text" id="newTitle" placeholder="What needs to be done?"/>
      <button class="btn-add" onclick="createTodo()">+ Add</button>
    </div>
    <textarea id="newDesc" placeholder="Description (optional)"></textarea>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
  </div>

  <!-- List -->
  <div class="todo-list" id="todoList"></div>
</main>

<!-- Edit Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Edit Task</div>
    <input type="text" id="editTitle" placeholder="Title" style="width:100%;margin-bottom:10px"/>
    <textarea id="editDesc" placeholder="Description" style="width:100%;height:80px;margin-bottom:0"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/index.js"></script>
</body>
</html>
