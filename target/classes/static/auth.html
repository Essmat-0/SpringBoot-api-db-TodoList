<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TodoList — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="/css/auth.css" rel="stylesheet">
</head>
<body>
<div class="grid-bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="brand">todo<span>.</span></div>
  <div class="tagline">your tasks, your space</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="your_username" autocomplete="off"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>

  <button class="btn" id="submitBtn" onclick="handleSubmit()">Sign In</button>
  <div class="message" id="msg"></div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
