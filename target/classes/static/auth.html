<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TodoList — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6aff;
    --accent2: #ff6a8a;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --success: #4fffb0;
    --error: #ff4f6a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    z-index: 0;
    pointer-events: none;
  }
  .glow-1 { background: var(--accent); top: -200px; left: -200px; }
  .glow-2 { background: var(--accent2); bottom: -200px; right: -200px; }

  .card {
    position: relative;
    z-index: 1;
    width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px 40px;
    animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .brand span { color: var(--accent); }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    transition: color 0.2s;
    position: relative;
  }
  .tab::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.2s;
  }
  .tab.active { color: var(--text); }
  .tab.active::after { transform: scaleX(1); }

  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .message {
    font-size: 12px;
    padding: 10px 14px;
    margin-top: 16px;
    display: none;
  }
  .message.error { background: rgba(255,79,106,0.1); color: var(--error); border-left: 2px solid var(--error); }
  .message.success { background: rgba(79,255,176,0.1); color: var(--success); border-left: 2px solid var(--success); }
  .message.show { display: block; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="brand">todo<span>.</span></div>
  <div class="tagline">your tasks, your space</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="your_username" autocomplete="off"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>

  <button class="btn" id="submitBtn" onclick="handleSubmit()">Sign In</button>
  <div class="message" id="msg"></div>
</div>

<script>
  const API = 'http://localhost:8080/api';
  let mode = 'login';

  function switchTab(tab) {
    mode = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('submitBtn').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
    hideMsg();
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = `message ${type} show`;
  }
  function hideMsg() {
    document.getElementById('msg').className = 'message';
  }

  async function handleSubmit() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) return showMsg('Fill in all fields.', 'error');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/${mode}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Something went wrong');
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.username);
      window.location.href = 'index.html';
    } catch (e) {
      showMsg(e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
  if (localStorage.getItem('token')) window.location.href = 'index.html';
</script>
</body>
</html>
